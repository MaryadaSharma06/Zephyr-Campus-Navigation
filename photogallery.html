<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zephyr Photo Gallery</title>
<link rel="stylesheet" href="premium-theme.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:white;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header h1{
    color:#d32f2f;
}

.gallery{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.gallery img:hover{
    transform:scale(1.03);
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1>Campus Photo Gallery</h1>
    <p>Explore the beauty of BMU Campus</p>
</header>

<div class="gallery">

    <img src="images/campus1.jpg" alt="Campus">
    <img src="images/campus2.jpg" alt="Campus">
    <img src="images/campus3.jpg" alt="Campus">
    <img src="images/campus4.jpg" alt="Campus">
    <img src="images/campus5.jpg" alt="Campus">
    <img src="images/campus6.jpg" alt="Campus">

</div>

<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn = document.querySelector('.close');

images.forEach(img=>{
    img.addEventListener('click',()=>{
        lightbox.style.display='flex';
        lightboxImg.src=img.src;
    });
});

closeBtn.addEventListener('click',()=>{
    lightbox.style.display='none';
});

lightbox.addEventListener('click',(e)=>{
    if(e.target===lightbox){
        lightbox.style.display='none';
    }
});
</script>

</body>
</html>
