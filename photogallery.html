<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zephyr Photo Gallery</title>
<link rel="stylesheet" href="premium-theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    padding-top: 70px;
}

header{
    background:white;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    margin-top: 20px;
}

header h1{
    color:#d32f2f;
}

.gallery{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.gallery img:hover{
    transform:scale(1.03);
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <img src="IMG_4164 (1).PNG" alt="Zephyr Logo" class="logo-image">
      <span>Zephyr</span>
    </div>
    
    <div class="nav-links">
      <a href="homepage.html">Home</a>
      <a href="feedback.html">Feedback</a>
      <a href="aboutus.html">About Us</a>
      <a href="login-signup.html">
        <button class="sign-in-btn">LOGIN / SIGNUP</button>
      </a>
    </div>

    <button class="menu-btn">
      <i data-lucide="menu"></i>
    </button>
  </div>
</nav>

<div class="mobile-menu">
  <a href="homepage.html">Home</a>
  <a href="feedback.html">Feedback</a>
  <a href="aboutus.html">About Us</a>
  <a href="login-signup.html">
    <button class="sign-in-btn">LOGIN / SIGNUP</button>
  </a>
</div>

<header>
    <h1>Campus Photo Gallery</h1>
    <p>Explore the beauty of BMU Campus</p>
</header>

<div class="gallery">

    <img src="Photogallery2.jpeg" alt="Campus">
    <img src="Photogallery3.jpeg" alt="Campus">
    <img src="Photogallery4.jpeg" alt="Campus">
    <img src="Photogallery5.jpeg" alt="Campus">
    <img src="Photogallery6.jpeg" alt="Campus">
    <img src="Photogallery7.jpeg" alt="Campus">
    <img src="Photogallery8.jpeg" alt="Campus">
    <img src="Photogallery9.jpeg" alt="Campus">

</div>

<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn = document.querySelector('.close');

images.forEach(img=>{
    img.addEventListener('click',()=>{
        lightbox.style.display='flex';
        lightboxImg.src=img.src;
    });
});

closeBtn.addEventListener('click',()=>{
    lightbox.style.display='none';
});

lightbox.addEventListener('click',(e)=>{
    if(e.target===lightbox){
        lightbox.style.display='none';
    }
});
</script>

<script src="auth-state.js"></script>
</body>
</html>
